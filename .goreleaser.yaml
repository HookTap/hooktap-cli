# GoReleaser config for the HookTap CLI.
# Build & publish:  git tag v0.1.0 && git push origin v0.1.0  → GitHub Action runs `goreleaser release`.
# Validate locally:  goreleaser check  /  goreleaser build --snapshot --clean
version: 2

project_name: hooktap

before:
  hooks:
    - go mod tidy

builds:
  - id: hooktap
    main: .
    binary: hooktap
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}

archives:
  - id: hooktap
    formats:
      - tar.gz
    # Windows users expect a .zip (and it's what Scoop fetches).
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publish a Homebrew cask to the tap so users can:
#   brew install hooktap/tap/hooktap
# (casks replaced the deprecated `brews` formula block in GoReleaser v2.)
homebrew_casks:
  - name: hooktap
    binaries:
      - hooktap
    repository:
      owner: hooktap
      name: homebrew-tap
      branch: main
      # A PAT with repo scope on the tap repo, exposed to the release workflow.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://hooktap.me"
    description: "Send webhook events to the HookTap app from your terminal"
    license: "MIT"
    commit_author:
      name: hooktap-bot
      email: bot@hooktap.me
    # The binaries are not notarised; strip the quarantine flag on install so
    # Gatekeeper doesn't block the CLI on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/hooktap"]
          end

# Publish a Scoop manifest so Windows users can:
#   scoop bucket add hooktap https://github.com/HookTap/scoop-bucket
#   scoop install hooktap
scoops:
  - name: hooktap
    repository:
      owner: hooktap
      name: scoop-bucket
      branch: main
      # Reuses the same PAT — it has repo scope across the HookTap org.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://hooktap.me"
    description: "Send webhook events to the HookTap app from your terminal"
    license: "MIT"
    commit_author:
      name: hooktap-bot
      email: bot@hooktap.me

release:
  draft: false
  prerelease: auto
